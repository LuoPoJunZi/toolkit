name: ci

on:
  push:
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck shfmt
      - name: Lint
        run: bash scripts/lint.sh
      - name: Smoke
        run: bash tests/smoke_menu.sh
